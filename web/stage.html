<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLDAP User Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; }
        .sidebar { width: 250px; background: #f4f4f4; padding: 10px; height: 100vh; overflow-y: auto; }
        .main { flex-grow: 1; padding: 20px; }
        .search-bar { width: 100%; padding: 8px; margin-bottom: 10px; }
        .user-info { border: 1px solid #ddd; padding: 10px; background: #fff; }
        .user-info img { max-width: 100px; }
        .form-group { margin-bottom: 10px; }
        label { font-weight: bold; display: block; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        .buttons { margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Users & Groups</h3>
        <input type="text" class="search-bar" placeholder="Search..." oninput="filterUsers(this.value)">
        <ul id="userList">
            <!-- User list will be loaded here -->
        </ul>
    </div>
    <div class="main">
        <h2>User Details</h2>
        <div class="user-info" id="userInfo">
            <p>Select a user to view details</p>
        </div>
    </div>

    <script>
        function fetchUsers() {
            fetch('http://localhost:4444/api/users')
                .then(response => response.json())
                .then(data => {
                    const userList = document.getElementById('userList');
                    userList.innerHTML = '';
                    data.forEach(user => {
                        const li = document.createElement('li');
                        li.textContent = user.username;
                        li.onclick = () => loadUserDetails(user);
                        userList.appendChild(li);
                    });
                });
        }

        function loadUserDetails(user) {
            document.getElementById('userInfo').innerHTML = `
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" value="${user.username}" disabled>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="text" value="${user.email}">
                </div>
                <div class="form-group">
                    <label>Home Directory:</label>
                    <input type="text" value="${user.homeDirectory}" disabled>
                </div>
                <div class="form-group">
                    <label>Location:</label>
                    <input type="text" value="${user.location}">
                </div>
                <div class="form-group">
                    <img src="${user.photo}" alt="User Photo">
                </div>
                <div class="buttons">
                    <button onclick="updateUser('${user.username}')">Save</button>
                    <button onclick="deleteUser('${user.username}')">Delete</button>
                </div>
            `;
        }

        function filterUsers(query) {
            const users = document.querySelectorAll('#userList li');
            users.forEach(user => {
                user.style.display = user.textContent.toLowerCase().includes(query.toLowerCase()) ? '' : 'none';
            });
        }

        function updateUser(username) {
            const email = document.querySelector('.user-info input:nth-of-type(2)').value;
            const location = document.querySelector('.user-info input:nth-of-type(3)').value;
            fetch('http://localhost:4444/api/editUser', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, location })
            }).then(() => fetchUsers());
        }

        function deleteUser(username) {
            if (confirm("Are you sure you want to delete " + username + "?")) {
                fetch('http://localhost:4444/api/deleteUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                }).then(() => fetchUsers());
            }
        }

        fetchUsers();
    </script>
</body>
</html>
